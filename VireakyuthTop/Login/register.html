<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register MyShop</title>
    <link rel = "stylesheet" href = "./assets/css/style.css" />
    <link
        rel = "stylesheet"
        href = "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>

    <main class = "auth-container">
        <div class = "auth-card">
            <div class = "auth-header">
                <h2>Create Account</h2>
                <p>Join us and Start shopping today</p>
            </div>

            <form class = "auth-form">
                <div clas = "form-group">
                    <label for = "fullname">Full Name</label>
                    <div class = "input-with-icon">
                        <i class = "fas-fa-user"></i>
                        <input
                            type = "text"
                            id = "fullname"
                            placeholder = "Enter your fullname"
                            required
                        />
                    </div>
            </form>
        </div>
    <div class = "form-group">
        <label for = "email">Email</label>
        <div class = "input-with-icon">
            <i class = "fas-fa-envelope"></i>
            <input
                type = "email"
                id = "email"
                placeholder = "Enter your email address"
                required
                />
    </div>

    <div class = "form-group">
        <label for = "username">Username</label>
        <div class = "input-with-icon">
            <i class = "fas-fa-circle"></i>
            <input  
                type = "text"
                id = "username"
                placeholder = "Choose a username"
                required
            />
        </div>
    </div>

    <div class = "form -group">
        <label for = "password">Password</label>
        <div class = "input-with-icon">
            <i class = "fas-fa-lock"></i>
            <input  
                type = "password"
                id = "toggle-password"
                placeholder = "Create a password"
                required 
                />
                <button
                    type = "button"
                    class = "toggle-password"
                    data-target = "password"
                    title = "Toggle password visibility"
                >

                <i class = "far fa-eye"></i>
            </button>
        </div>
    
    <div class = "form-group">
        <label for = "confirm-password">Confirm Password</label>
        <div class = "input-with-icon">
            <i class = "fas fa-lock"></i>
            <input  
                type = "password"
                id = "password"
                placeholder = "Confirm your password"
                required
            />
            <button 
                type = "button"
                class = "toggle-password"
                data-target = "confirm-password"
                title = "Toggle password visibility"
                required
            >
                <i class = "fas fa-eye"></i>
                </button>
            </div>
        <button type = "submit" class = "btn btn-primary btn-block">
            Creat Account
        </button>

        <div class = "social-login">
            <p>Or Sign up with</p>
            <div class = "social-icons">
                <a href = '#' class = "social-icons facebook" title = "Facebook">
                    <i class = "fab fa-facebook-f"></i>
                    <a></a>
                    <a href = '#' class = "social-icon google" title = "Google">
                        <i class = "fab fa-google"></i>
                    </a>
                <a href = '#' class = "social-icon twitter" title = "Twitter">
                    <i class = "fab fa-twitter"></i>
                </a>
                </a>

            </div>
            <div class = "auth-footer">
                <p>Already have account? <a href = "login.html">Sign in</a></p>
            </div>

            <script>
                
            </script>
    </main>


    
</body>
</html>
